
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>人生というゲーム ～君の選択が人生をつくる～</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="container">

        <h1>人生というゲーム</h1>

        <p class="subtitle">
            ～君の選択が人生をつくる～
        </p>

        <p class="catch">
            人生に正解はない。<br>
            あるのは、君が積み重ねた選択だけ。
        </p>

        <div class="menu">

           
<h2>主人公の名前</h2>

<input type="text" id="nameInput" placeholder="名前を入力">

<br><br>

<button onclick="startGame()">
    ▶ GAME START
</button>
     
           <button id="continueButton">

           ▶ CONTINUE

            </button>

            <button onclick="location.href='guide.html'">
                ▶ GUIDE
            </button>

            <button onclick="location.href='settings.html'">
                ▶ SETTINGS
            </button>

            <button onclick="location.href='credits.html'">
                ▶ CREDITS
            </button>
<button onclick="openBugReport()">
    🐞 バグ報告
</button>
        </div>

    <div class="version">
    Version 0.1.0 Beta<br>
    Test Build - Feedback Welcome
</div>
      

        <footer>
            © 2026 人生というゲーム Project
        </footer>

        <!-- ARG演出用（通常は非表示） -->
        <p id="secretMessage"
           style="display:none;">
            君は、本当にプレイヤー？
        </p>

    </main>

    <script src="js/main.js"></script>
    <script>
function startGame() {

    const name = document.getElementById("nameInput").value;

    if (!name) {
        alert("名前を入力してください");
        return;
    }

    localStorage.setItem("playerName", name);

    location.href = "game.html";
}
</script>

</body>
</html>
