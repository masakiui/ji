<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>人生というゲーム ～君の選択が人生をつくる～</title>

    <link rel="stylesheet" href="css/game.css">
</head>

<body>

<div class="game-container">

    <!-- =========================
        ステータス
    ========================== -->
    <aside class="status">

        <h2>PLAYER STATUS</h2>

        <hr>

        <p>名前：<span id="playerName">主人公</span></p>
        <p>年齢：<span id="age">24歳</span></p>
        <p>職業：<span id="job">地方の準社員</span></p>
        <p>時給：<span id="hourly">1040円</span></p>

        <hr>

        <p>所持金：<span id="money">30000円</span></p>
        <p>貯金：<span id="saving">0円</span></p>
        <p>投資資産：<span id="investmentMoney">0円</span></p>

        <hr>

        <p>体力：<span id="hp">100</span></p>
        <p>幸福度：<span id="happy">50</span></p>
        <p>知識：<span id="knowledge">1</span></p>

    </aside>

    <!-- =========================
        メイン
    ========================== -->
    <main class="main">

        <header>

            <h1>人生というゲーム</h1>
            <h3>～君の選択が人生をつくる～</h3>

            <hr>

            <p>
                <span id="year">第1年</span>
                <span id="season">春</span>
                <span id="month">4月</span>
                <span id="day">1日</span>
                <span id="week">月曜日</span>
            </p>

        </header>

        <!-- イベント -->
        <section class="event-window">

            <h2>今日の出来事</h2>

            <p id="eventText">
                今日も静かな朝を迎えた。<br><br>
                君はどうする？
            </p>

        </section>

        <!-- 行動ボタン -->
        <section class="actions">

            <button id="work">💼 仕事へ行く</button>
            <button id="study">📚 勉強する</button>
            <button id="rest">🛏 休む</button>
            <button id="shopping">🛒 買い物</button>
            <button id="investment">📈 投資を学ぶ</button>
            <button id="skill">🎓 資格取得</button>

            <button id="save">💾 セーブ</button>
            <button id="nextDay">📅 次の日へ</button>

            <button onclick="location.href='index.html'">← タイトルへ戻る</button>

        </section>

    </main>

</div>

<!-- =========================
    ログ
========================= -->
<section class="log-window">

    <h2>GAME LOG</h2>

    <div id="log">ゲーム開始</div>

</section>

<!-- バージョン表示 -->
<div id="versionTag"></div>

<!-- JSは必ず最後 -->
<script src="js/game.js"></script>

</body>
</html>
