```html
<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>人生というゲーム</title>

    <link rel="stylesheet"
          href="css/game.css">

</head>

<body>

<div class="game-container">

    <!-- ステータス -->

    <aside class="status">

        <h2>PLAYER STATUS</h2>

        <hr>

        <p><strong>名前</strong><br></p>
        <span id="playerName">主人公</span>

        <p><strong>年齢</strong><br>
        <span id="age">24歳</span></p>

        <p><strong>職業</strong><br>
        <span id="job">地方の準社員</span></p>

        <p><strong>時給</strong><br>
        <span id="hourly">1040円</span></p>

        <p><strong>所持金</strong><br>
        <span id="money">30,000円</span></p>

        <p><strong>貯金</strong><br>
        <span id="saving">0円</span></p>

        <p><strong>体力</strong><br>
        <span id="hp">100</span></p>

        <p><strong>幸福度</strong><br>
        <span id="happy">50</span></p>

        <p><strong>知識</strong><br>
        <span id="knowledge">1</span></p>

        <p><strong>学習意欲</strong><br>
        ★★★☆☆</p>

        <p><strong>特性</strong><br>
        覚えにくい性格</p>

    </aside>

    <!-- メイン -->

    <main class="main">

        <header>

            <h1>人生というゲーム</h1>

            <p>

                第1年　
                春　
                月曜日

            </p>

        </header>

        <section class="event-window">

            <h2>今日の出来事</h2>

            <p id="eventText">

                今日も静かな朝を迎えた。

                さて……

                君は今日、

                何を選ぶ？

            </p>

        </section>

        <section class="actions">

            <button id="work">
                💼 仕事へ行く
            </button>

            <button id="study">
                📚 勉強する
            </button>

            <button id="rest">
                🛏 休む
            </button>

            <button id="shopping">
                🛒 買い物
            </button>

            <button id="investment">
                📈 投資を学ぶ
            </button>

            <button id="skill">
                🎓 資格取得
            </button>

            <button id="save">
                💾 セーブ
            </button>

            <button onclick="location.href='index.html'">
                ← タイトルへ戻る
            </button>

        </section>

    </main>

</div>

<!-- ログ -->

<section class="log-window">

    <h2>GAME LOG</h2>

    <div id="log">

        ゲーム開始。

    </div>

</section>

<script src="js/game.js"></script>

</body>

</html>
```
